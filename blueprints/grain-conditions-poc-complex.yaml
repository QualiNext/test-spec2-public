# Complex dependency/data-flow test blueprint
# 2D flow graph (depends-on):
#
#                                           -> skip_helm_shadow (skip)
#                                         /
# tf_seed -> tg_bridge -> helm_namespace -> k8s_config
#    |            \                             \
#    |             -> bp_bridge -----------------> shell_report
#    |
#    -> skip_tf_noise (skip) -> skip_blueprint_branch (skip) -> skip_shell_cleanup (skip)

spec_version: 2
description: 'Complex grain dependency and data-flow test with skip branches'

inputs:
  agent:
    type: 'agent'
  message:
    type: 'string'
    default: 'hello-complex-flow'
  namespace:
    type: 'string'
    default: 'yakir-test'
  should:
    type: string
    allowed-values:
      - 'yes'
      - 'no'
    description: should run the grain (yes/no)

outputs:
  main_tf_string:
    value: '{{ .grains.tf_seed.outputs.test_string1 }}'
  bridge_const:
    value: '{{ .grains.tg_bridge.outputs.test_const }}'
  nested_bp_output:
    value: '{{ .grains.bp_bridge.outputs.grain_output1 }}'
  skip_helm_shadow_output:
    value: '{{ .grains.skip_helm_shadow.scripts.post-helm-install.outputs.testoutput }}'

grains:
  tf_seed:
    kind: terraform
    spec:
      source:
        store: test-spec2-public
        path: terraform/tf-inputs-echo
      agent:
        name: '{{ .inputs.agent }}'
      inputs:
        - test_string1: '{{ .inputs.message }}'
        - test_string2: '{{ .inputs.namespace }}'
        - test_number: 7
        - test_bool: true
      outputs:
        - test_string1
        - test_string2
        - test_const

  tg_bridge:
    kind: terragrunt
    when: '{{ .grains.tf_seed.is_active }}'
    spec:
      source:
        store: test-spec2-public
        path: terragrunt/simple-input-echo
      agent:
        name: '{{ .inputs.agent }}'
      env-vars:
        - TG_STATE_KEY_NAME: '{{ sandboxid | downcase }}-grain-poc-complex'
      inputs:
        - test_string1: '{{ .grains.tf_seed.outputs.test_string1 }}-tg'
        - test_string2: '{{ .grains.tf_seed.outputs.test_string2 }}'
        - test_number: 11
        - test_bool: true
      outputs:
        - test_string1
        - test_string2
        - test_const
    depends-on: tf_seed

  helm_namespace:
    kind: helm
    spec:
      namespace: '{{ .inputs.namespace }}'
      source:
        store: test-spec2-public
        path: helm/serviceaccount-simple
      agent:
        name: '{{ .inputs.agent }}'
      inputs:
        - serviceAccount.name: '{{ sandboxid | downcase }}-main-sa'
        - serviceAccount.annotations.flow-source: '{{ .grains.tg_bridge.outputs.test_const }}'
        - serviceAccount.automountServiceAccountToken: true
    depends-on: tg_bridge

  k8s_config:
    kind: kubernetes
    spec:
      source:
        store: test-spec2-public
        path: manifests/simple-configmap/configmap.yaml
      namespace: '{{ .inputs.namespace }}'
      agent:
        name: '{{ .inputs.agent }}'
    depends-on: helm_namespace
  
  skip_tf_noise:
    kind: terraform
    when: '{% if .inputs.should == "yes" %} true {% else %} false {% endif %}'
    spec:
      source:
        store: test-spec2-public
        path: terraform/tf-inputs-echo
      agent:
        name: '{{ .inputs.agent }}'
      inputs:
        - test_string1: 'skip-{{ .grains.tf_seed.outputs.test_string1 }}'
        - test_string2: '{{ .inputs.namespace }}-skip'
        - test_number: 3
        - test_bool: false
      outputs:
        - test_string1
        - test_string2
    depends-on: tf_seed

  skip_blueprint_branch:
    kind: blueprint
    when: '{{ .grains.skip_tf_noise.is_active }}'
    spec:
      source:
        store: test-spec2-public
        path: blueprints/bp-inputs-echo.yaml
      inputs:
        - agent: '{{ .inputs.agent }}'
        - should: '{{ .inputs.should }}'
        - input1: '{{ .grains.skip_tf_noise.outputs.test_string1 }}'
        - input2: '{{ .grains.skip_tf_noise.outputs.test_string2 }}'
        - input3: 'skip-branch'
      outputs:
        - output1
        - grain_output1
        - grain_output2
    depends-on: skip_tf_noise

  skip_helm_shadow:
    kind: helm
    when: '{% if .inputs.should == "yes" %} true {% else %} false {% endif %}'
    # condition:
    #   - type: approval
    #     message: 'This is a message to include in the approval request'
    #     channels:
    #       - type: group
    #         groups:
    #           - grain-conditions
    spec:
      namespace: '{{ .inputs.namespace }}'
      source:
        store: test-spec2-public
        path: helm/serviceaccount-simple
      agent:
        name: '{{ .inputs.agent }}'
      inputs:
        - serviceAccount.name: '{{ sandboxid | downcase }}-skip-shadow-sa'
        - serviceAccount.annotations.flow-source: 'skip-branch'
        - serviceAccount.automountServiceAccountToken: false
      scripts:
        post-helm-install:
          source:
            store: test-spec2-public
            path: scripts/sample-k8s.sh
          arguments: '{{ .inputs.namespace }}'
          outputs:
            - testoutput
    depends-on: tg_bridge

  skip_shell_cleanup:
    kind: shell
    when: '{{ .grains.skip_blueprint_branch.is_active }}'
    spec:
      agent:
        name: '{{ .inputs.agent }}'
      activities:
        deploy:
          commands:
            - name: skipped_cleanup
              command: 'export output1="skip-cleanup-done"; export output2="{{ .grains.skip_blueprint_branch.outputs.grain_output1 }}"; echo "skip cleanup branch"'
              outputs:
                - output1
                - output2
    depends-on: skip_blueprint_branch

  bp_bridge:
    kind: blueprint
    spec:
      source:
        store: test-spec2-public
        path: blueprints/bp-inputs-echo.yaml
      inputs:
        - agent: '{{ .inputs.agent }}'
        - should: '{{ .inputs.should }}'
        - input1: '{{ .grains.tg_bridge.outputs.test_string1 }}'        
        - input2: '{{ .grains.skip_shell_cleanup.activities.deploy.commands.skipped_cleanup.outputs.output1 }}'
        - input3: '{{ .inputs.namespace }}'
      outputs:
        - output1
        - grain_output1
        - grain_output2
    depends-on: skip_shell_cleanup, k8s_config

  shell_report:
    kind: shell
    spec:
      agent:
        name: '{{ .inputs.agent }}'
      files:
        - source: test-spec2-public
          path: scripts/echo.sh
      activities:
        deploy:
          commands:
            - name: report_flow
              command: 'echo "bp1={{ .grains.bp_bridge.outputs.grain_output1 }} bp2={{ .grains.bp_bridge.outputs.grain_output2 }} tf={{.grains.skip_tf_noise.outputs.test_string1}}. helm={{ .grains.skip_helm_shadow.scripts.post-helm-install.outputs.testoutput }}.const={{ .grains.tg_bridge.outputs.test_const }}"'
            - name: run_script
              command: './echo.sh'
    depends-on: bp_bridge, helm_namespace, skip_helm_shadow, skip_tf_noise
